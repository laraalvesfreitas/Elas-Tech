

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div class="container">

        <img src="assets/logoong.png" alt="Logo">


        <h1><span>Patinhas </span> Solidárias</h1>

       <main>

        <header>
            
            <a href="index.html">
               <i class="fa-solid fa-angle-left"></i>
           </a>
   
           <h1>Novo <span>animal</span> </h1>

        </header>

        <form>
            <label for="input-name">Nome:</label>

            <div class="select-div">
            <select type="text" name="" id="input-field"> 
                <option value="" >Selecione uma Cidade</option>
                <option value="cidade">Belo Horizonte</option>
            </select>
            </div>

            <div class="points">
                <label for="input-points">Caracteristicas</label>
                <input type="text" name="" id="input-points">
                <button>
                <i class="fa-solid fa-circle-plus"></i>
                </button>
            
            </div>
        </form>
       
        <div class="actions">
            <a href="cadastro-animal.html">Cadastrar</a>

        </main>
